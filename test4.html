<!DOCTYPE html>
<html>
<head>
<title>JavaScript Tasks</title>

<style>
  body {
    font-family: Arial, sans-serif;
    text-align: center;
    margin: 30px;
    transition: 0.3s;
  }

  .box {
    border: 1px solid #ccc;
    padding: 20px;
    margin: 20px auto;
    width: 300px;
    border-radius: 10px;
  }

  button {
    padding: 8px 15px;
    margin: 5px;
    cursor: pointer;
    border: none;
    background: #ff69b4;
    color: white;
    border-radius: 5px;
  }

  input {
    padding: 8px;
    margin: 5px;
    width: 80%;
  }

  img {
    width: 250px;
    height: 150px;
    border-radius: 10px;
  }
</style>
</head>

<body>

<h1>JavaScript Mini Tasks</h1>

<!-- 1. Background Color -->
<div class="box">
  <h3>Change Background</h3>
  <button onclick="changeColor()">Change Color</button>
</div>

<!-- 2. Live Text -->
<div class="box">
  <h3>Live Text Display</h3>
  <input type="text" id="inputText" placeholder="Type here..." onkeyup="showText()">
  <p id="output"></p>
</div>

<!-- 3. Password Toggle -->
<div class="box">
  <h3>Password Toggle</h3>
  <input type="password" id="password">
  <button onclick="togglePassword()">Show/Hide</button>
</div>

<!-- 4. Image Slider -->
<div class="box">
  <h3>Image Slider</h3>
  <img id="slider" src="mouthwatering-cake-jpg-happy-occasions-600nw-2544094049.webp">
  <br>
  <button onclick="prev()">Prev</button>
  <button onclick="next()">Next</button>
</div>

<!-- 5. Counter -->
<div class="box">
  <h3>Counter</h3>
  <h2 id="count">0</h2>
  <button onclick="increment()">+</button>
  <button onclick="decrement()">-</button>
</div>

<script>
  // 1. Background Color
  function changeColor() {
    document.body.style.backgroundColor =
      "#" + Math.floor(Math.random()*16777215).toString(16);
  }

  // 2. Live Text
  function showText() {
    document.getElementById("output").innerText =
      document.getElementById("inputText").value;
  }

  // 3. Password Toggle
  function togglePassword() {
    let pass = document.getElementById("password");
    pass.type = pass.type === "password" ? "text" : "password";
  }

  // 4. Image Slider
  let images = [
    "decadent-chocolate-cake-symphony-brown_632498-24549.avif",
    "pngtree-birthday-cake-png-image_17407517.png",
    "images.jfif"
  ];
  let index = 0;

  function showImage() {
    document.getElementById("slider").src = images[index];
  }

  function next() {
    index = (index + 1) % images.length;
    showImage();
  }

  function prev() {
    index = (index - 1 + images.length) % images.length;
    showImage();
  }

  // 5. Counter
  let count = 0;

  function increment() {
    count++;
    document.getElementById("count").innerText = count;
  }

  function decrement() {
    count--;
    document.getElementById("count").innerText = count;
  }
</script>

</body>
</html>
